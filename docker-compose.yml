services:
  splunk:
    image: splunk/splunk:latest
    container_name: splunk-spl-forge
    hostname: splunk
    ports:
      - "8000:8000"
      - "8089:8089"
    environment:
      SPLUNK_PASSWORD: SplunkDemo123!
      SPLUNK_START_ARGS: "--accept-license"
      SPLUNK_DEFAULTS_URL: ""
    volumes:
      - splunk-data:/opt/splunk/var
      - splunk-etc:/opt/splunk/etc
    networks:
      - spl-forge-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "-k", "https://localhost:8089/services/server/info"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 4G
        reservations:
          cpus: "1"
          memory: 2G

volumes:
  splunk-data:
    driver: local
  splunk-etc:
    driver: local

networks:
  spl-forge-network:
    driver: bridge
