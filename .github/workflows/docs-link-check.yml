name: Docs Link Check

on:
  pull_request:
    paths:
      - "**/*.md"
      - ".github/workflows/docs-link-check.yml"
  push:
    branches:
      - main
      - master
    paths:
      - "**/*.md"
      - ".github/workflows/docs-link-check.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  links:
    name: Check Markdown links
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Check links
        uses: lycheeverse/lychee-action@v2
        with:
          args: --verbose --no-progress "**/*.md"
          fail: true

